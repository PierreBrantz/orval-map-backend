spring:
  datasource:
    # Railway donne souvent DATABASE_URL, mais on a besoin du format JDBC.
    # Si vous utilisez le plugin Postgres de Railway, il fournit PGHOST, PGPORT, etc.
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
