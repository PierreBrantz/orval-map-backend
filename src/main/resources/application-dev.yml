spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/orvalmap
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create # ⚠️ Temporaire : Recrée les tables pour ajouter les nouvelles colonnes
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.orvalmap: DEBUG
    org.springframework.security: DEBUG
