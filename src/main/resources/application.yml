spring:
  application:
    name: orval-map
  profiles:
    active: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orvalmap}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update

cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME:votre_cloud_name_ici}
  api_key: ${CLOUDINARY_API_KEY:votre_api_key_ici}
  api_secret: ${CLOUDINARY_API_SECRET:votre_api_secret_ici}

jwt:
  secret: ${JWT_SECRET:cleSecreteAChangerQuiDoitQdMemeetreSuperGrande}

server:
  address: 0.0.0.0

logging:
  level:
    com.orvalmap.security: DEBUG
    org.springframework.security: DEBUG
