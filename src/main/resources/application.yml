spring:
  application:
    name: orval-map
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orvalmap}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

# On utilise un préfixe unique 'app.' pour éviter les conflits avec Railway/Docker
app:
  cloudinary:
    name: ${CLOUDINARY_CLOUD_NAME:votre_cloud_name_reel}
    key: ${CLOUDINARY_API_KEY:votre_api_key_reel}
    secret: ${CLOUDINARY_API_SECRET:votre_api_secret_reel}

jwt:
  secret: ${JWT_SECRET:cleSecreteAChangerQuiDoitQdMemeetreSuperGrandeEtSecurisee}

server:
  port: ${PORT:8080}

logging:
  level:
    com.orvalmap: INFO
    org.springframework.security: INFO
