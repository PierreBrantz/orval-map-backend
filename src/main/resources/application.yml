spring:
  application:
    name: orval-map
  
  datasource:
    # Priorité 1: Utiliser DATABASE_URL si elle est définie (souvent fournie par Railway pour le service Postgres)
    # Priorité 2: Utiliser PGHOST/PGPORT/PGDATABASE si définies (variables Railway pour le service Postgres)
    # Priorité 3: Utiliser localhost:5432/orvalmap par défaut (pour le développement local)
    url: ${DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:orvalmap}}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

# Configuration commune
cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME}
  api_key: ${CLOUDINARY_API_KEY}
  api_secret: ${CLOUDINARY_API_SECRET}

jwt:
  secret: ${JWT_SECRET:cleSecreteAChangerQuiDoitQdMemeetreSuperGrandeEtSecurisee}

server:
  port: ${PORT:8080}

logging:
  level:
    com.orvalmap: INFO
