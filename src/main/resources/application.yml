spring:
  application:
    name: orval-map
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev} # Utilise la variable d'env, sinon 'dev' par défaut

# Configuration commune
cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME}
  api_key: ${CLOUDINARY_API_KEY}
  api_secret: ${CLOUDINARY_API_SECRET}

jwt:
  secret: ${JWT_SECRET:cleSecreteAChangerQuiDoitQdMemeetreSuperGrandeEtSecurisee}

server:
  address: 0.0.0.0
  port: ${PORT:8080}

logging:
  level:
    com.orvalmap: INFO
    org.springframework.security: INFO
